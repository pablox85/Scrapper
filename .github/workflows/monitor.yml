name: Acredita Monitor

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: "*/5 * * * *"
    - cron: "0 11 * * *"
    - cron: "5/5 19-23 4 6 *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Modo de ejecución"
        required: true
        default: "check"
        type: choice
        options:
          - check
          - heartbeat
          - force-change
          - test
          - telegram-commands

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="${{ github.event.inputs.mode }}"
          elif [ "${{ github.event_name }}" = "schedule" ]; then
            case "${{ github.event.schedule }}" in
              "0 11 * * *"|"5/5 19-23 4 6 *")
                MODE="heartbeat"
                ;;
              *)
                MODE="check"
                ;;
            esac
          else
            MODE="check"
          fi

          echo "Modo ejecutado: $MODE"
          python monitor.py "$MODE"

      - name: Commit updated page state
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ ! -f page_state.txt ]; then
            echo "page_state.txt does not exist. Nothing to commit."
            exit 0
          fi

          git add page_state.txt

          if git diff --cached --quiet; then
            echo "No state changes to commit."
            exit 0
          fi

          git commit -m "Update Acredita page state"
          git pull --rebase
          git push
